<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Card">
<title>QR Code – Giovanni Curatolo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    min-height: -webkit-fill-available;
    background: #0D2B45;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
  }

  .qr-card {
    background: #ffffff;
    border-radius: 20px;
    overflow: hidden;
    width: 280px;
    box-shadow: 0 20px 60px rgba(13,43,69,0.18), 0 4px 16px rgba(13,43,69,0.10);
    text-align: center;
  }

  .qr-header {
    background: #0D2B45;
    padding: 18px 24px 14px;
  }

  .qr-header .epra {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 4px;
  }

  .qr-header .name {
    font-size: 16px;
    font-weight: 700;
    color: #ffffff;
  }

  .qr-header .title {
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    margin-top: 2px;
  }

  .qr-body {
    padding: 24px 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  #qrcode {
    border-radius: 10px;
    overflow: hidden;
    border: 3px solid #e3edf7;
    display: inline-block;
  }

  #qrcode canvas, #qrcode img { display: block; }

  .scan-label {
    font-size: 12px;
    color: #1A527A;
    font-weight: 600;
  }

  .scan-sub {
    font-size: 11px;
    color: #aaa;
    line-height: 1.5;
    margin-top: -8px;
  }

  .footer-bar {
    background: #0D2B45;
    height: 5px;
  }
</style>
</head>
<body>
<div class="qr-card">
  <div class="qr-header">
    <div class="epra">EPRA</div>
    <div class="name">Giovanni Curatolo</div>
    <div class="title">Research &amp; Index Analyst</div>
  </div>
  <div class="qr-body">
    <div id="qrcode"></div>
    <div class="scan-label">Scan to open card</div>
    <div class="scan-sub">Opens full digital business card<br>on any device</div>
  </div>
  <div class="footer-bar"></div>
</div>

<script>
  new QRCode(document.getElementById("qrcode"), {
    text: "https://g-curatolo.github.io/bcard/",
    width: 180,
    height: 180,
    colorDark: "#0D2B45",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
